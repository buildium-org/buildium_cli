# Runs tests and a cross-platform snapshot build on every pull request, then
# uploads the binaries as downloadable workflow artifacts. This lets reviewers
# grab a pre-built buildium for any OS straight from the PR's Actions run, and
# catches cross-compile breakage before a release tag is cut.
#
# These are snapshot builds (no GitHub Release, no secrets). Public, versioned
# downloads come from release.yml when a v* tag is pushed.
name: ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build snapshot binaries
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: buildium-binaries
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          if-no-files-found: error
